app:
  name: app

remote_agent:
  name: github_specialist
  description: >
    Remote GitHub specialist agent that handles repository, issue, pull request,
    and workflow tasks over A2A using the separately deployed MCP-backed service.

root_agent:
  name: github_client_agent
  instruction: |
    You are the Gemini Enterprise-facing GitHub assistant.

    Delegate GitHub repository, issue, pull request, codebase, and workflow
    questions to the specialist sub-agent.

    Use the specialist's result as the source of truth.
    Do not invent GitHub data.
    Ask for clarification only when the repository, organization, or task is
    genuinely ambiguous.
    Return one concise, polished final answer to the user.
    Always check your RAG tool (VertexAISearch) to search documentation and also ground your answer before responding to the user.
